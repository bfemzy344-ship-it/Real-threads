<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Threads | Real Estate Shares</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { background: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 5px; width: 100%; font-size: 16px; cursor: pointer; }
        .payment-info { background: #e9ecef; padding: 15px; border-radius: 5px; display: none; margin-top: 10px; }
        h1 { color: #333; }
        .status { color: #555; font-size: 14px; }
    </style>
</head>
<body>

    <h1>Real Threads</h1>
    
    <div class="card">
        <h3>Lekki Phase 1 Apartment</h3>
        <p>Price per share: <b>₦3,000</b></p>
        <button class="btn" onclick="showPayment()">Buy Shares</button>
        
        <div id="paymentBox" class="payment-info">
            <p><strong>Transfer to:</strong></p>
            <p>Bank: Momo PSB</p>
            <p>Acct: 7047056423</p>
            <p>Name: Real Threads</p>
            <p><small>Upload receipt to WhatsApp for verification.</small></p>
        </div>
    </div>

    <div class="card">
        <h3>Your Earnings</h3>
        <p id="balance">Balance: ₦0.00</p>
        <p class="status">Min. withdrawal: ₦5,000 (Monthly)</p>
        <button class="btn" style="background:#007bff;" onclick="withdraw()">Withdraw Earnings</button>
    </div>

    <script>
        function showPayment() {
            document.getElementById('paymentBox').style.display = 'block';
        }

        function withdraw() {
            const balance = 0; // This would come from your database
            const today = new Date().getDate();
            
            if (balance < 5000) {
                alert("Minimum withdrawal is ₦5,000.");
            } else if (today < 25) {
                alert("Withdrawals are only open from the 25th of every month.");
            } else {
                alert("Withdrawal request sent!");
            }
        }
    </script>
</body>
</html>
